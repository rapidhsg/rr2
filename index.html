<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="300">
<title>Rapid Roofing — Sales Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   RAPID ROOFING SALES LEADERBOARD
   Per-rep performance dashboard. Swap DATA block below to refresh.
   Designed for 1920x1080 office TV display.
   Matches thermometer header/visual system exactly.
   ============================================================ */

:root {
  --bg: #0a0a0a;
  --bg-tile: #141414;
  --bg-tile-elev: #1c1c1c;
  --text: #ffffff;
  --text-dim: #888888;
  --text-faint: #4a4a4a;
  --rapid-red: #CC0000;
  --flashpoint-yellow: #F4B800;
  --status-green: #A3E635;
  --status-lime: #65A30D;
  --status-yellow: #F4B800;
  --status-red: #CC0000;
  --border-subtle: #262626;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Oswald', sans-serif;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' /%3E%3C/svg%3E");
}

.dashboard {
  width: 100vw;
  height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr auto;
  padding: 1.5vw 1.8vw 1.1vw;
  gap: 1.3vw;
  position: relative;
  z-index: 2;
}

/* ============ TOP STRIP ============ */
.top-strip {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 2vw;
  padding: 0.5vw 1.5vw;
  min-height: 6.5vw;
  background: linear-gradient(90deg, var(--rapid-red) 0%, #8a0000 100%);
  border-radius: 4px;
  position: relative;
  overflow: hidden;
}

.top-strip::after {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 12px,
    rgba(255,255,255,0.03) 12px,
    rgba(255,255,255,0.03) 24px
  );
  pointer-events: none;
}

.scoreboard-title {
  font-family: 'Anton', sans-serif;
  font-size: 3.4vw;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  text-align: center;
  color: #fff;
  text-shadow: 0 2px 0 rgba(0,0,0,0.25);
  line-height: 1;
}

.quarter-label {
  font-family: 'Anton', sans-serif;
  font-size: 2.4vw;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  text-align: right;
  color: #fff;
}

/* ============ TILE GRID ============ */
.grid {
  display: grid;
  grid-template-rows: 1.4fr 1fr;
  gap: 1.3vw;
  min-height: 0;
}

.row-reps {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1.3vw;
  min-height: 0;
}

.row-setters {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1.3vw;
  min-height: 0;
}

/* Setter tiles occupy the middle 2 columns */
.setter-label {
  display: flex;
  flex-direction: column;
  justify-content: center;
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--text-faint);
  padding: 0 0.5vw;
}

.setter-label .heading {
  font-family: 'Anton', sans-serif;
  font-size: 2.2vw;
  color: var(--text-dim);
  line-height: 0.95;
  letter-spacing: 0.02em;
}

.setter-label .sub {
  font-size: 0.85vw;
  color: var(--text-faint);
  margin-top: 0.4vw;
  letter-spacing: 0.18em;
}

.setter-label .accent-bar {
  width: 3vw;
  height: 3px;
  background: var(--rapid-red);
  margin-top: 0.7vw;
}

.team-summary {
  background: var(--bg-tile);
  border: 2px solid var(--border-subtle);
  border-radius: 6px;
  padding: 1vw 1.2vw;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 0.4vw;
  position: relative;
  overflow: hidden;
}

.team-summary::before {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 5px;
  background: var(--flashpoint-yellow);
}

.team-summary .ts-label {
  font-family: 'Oswald', sans-serif;
  font-weight: 600;
  font-size: 1vw;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-dim);
}

.team-summary .ts-rows {
  display: flex;
  flex-direction: column;
  gap: 0.35vw;
  margin-top: 0.3vw;
}

.team-summary .ts-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85vw;
  color: var(--text-dim);
  letter-spacing: 0.04em;
}

.team-summary .ts-row .k {
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-faint);
}

.team-summary .ts-row .v {
  font-family: 'Anton', sans-serif;
  font-size: 1.4vw;
  color: var(--text);
  letter-spacing: 0.02em;
}

/* ============ CROWN (for #1 rep) ============ */
.crown {
  position: absolute;
  top: -1.8vw;
  right: 0.6vw;
  width: 5.5vw;
  height: 4vw;
  z-index: 10;
  filter: drop-shadow(0 4px 10px rgba(244,184,0,0.5));
  animation: crown-float 3.5s ease-in-out infinite;
  transform-origin: center bottom;
}

@keyframes crown-float {
  0%, 100% { transform: translateY(0) rotate(-4deg); }
  50% { transform: translateY(-4px) rotate(4deg); }
}

/* ============ TILE (base) ============ */
.tile {
  background: var(--bg-tile);
  border-radius: 6px;
  padding: 1.3vw 1.5vw;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 0.35vw;
  border: 2px solid var(--border-subtle);
  min-height: 0;
}

.tile::before {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 5px;
  background: var(--rank-color, var(--text-dim));
}

.tile.rank-1 { --rank-color: var(--status-green); }
.tile.rank-2 { --rank-color: var(--status-lime); }
.tile.rank-3 { --rank-color: var(--text-dim); }
.tile.rank-4 { --rank-color: var(--text-faint); }

.tile.rank-1 {
  background: radial-gradient(ellipse at center top, rgba(163,230,53,0.22) 0%, var(--bg-tile) 70%);
  box-shadow: 0 0 50px rgba(163,230,53,0.30), inset 0 0 60px rgba(163,230,53,0.07);
  overflow: visible;
}

.tile.rank-2 {
  background: radial-gradient(ellipse at center top, rgba(101,163,13,0.10) 0%, var(--bg-tile) 70%);
  box-shadow: 0 0 25px rgba(101,163,13,0.12), inset 0 0 50px rgba(101,163,13,0.03);
}

/* Setter tile coloring */
.tile.setter-tile { --rank-color: var(--flashpoint-yellow); }

/* ============ CROWN — for #1 only ============ */
.crown {
  position: absolute;
  top: -1.4vw;
  left: 50%;
  transform: translateX(-50%);
  width: 4.5vw;
  z-index: 5;
  pointer-events: none;
  filter:
    drop-shadow(0 0 14px rgba(244,184,0,0.55))
    drop-shadow(0 4px 8px rgba(0,0,0,0.6));
  animation: crown-bob 3.5s ease-in-out infinite;
}

.crown svg {
  width: 100%;
  height: auto;
  display: block;
}

@keyframes crown-bob {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50%      { transform: translateX(-50%) translateY(-0.3vw); }
}

.tile-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 0.6vw;
}

.tile-rep-name {
  font-family: 'Oswald', sans-serif;
  font-weight: 600;
  font-size: 1.15vw;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text);
  line-height: 1.1;
}

.tile-sub-role {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65vw;
  font-weight: 500;
  color: var(--text-faint);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 0.2vw;
}

.tile-rank-badge {
  font-family: 'Anton', sans-serif;
  font-weight: 400;
  font-size: 1.5vw;
  padding: 0.25vw 0.7vw;
  border-radius: 3px;
  background: var(--rank-color);
  color: #000;
  letter-spacing: 0.02em;
  line-height: 1;
  white-space: nowrap;
}

.tile.rank-3 .tile-rank-badge,
.tile.rank-4 .tile-rank-badge {
  color: #fff;
}

.tile-setter-badge {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 0.75vw;
  padding: 0.3vw 0.6vw;
  border-radius: 3px;
  background: var(--flashpoint-yellow);
  color: #000;
  letter-spacing: 0.08em;
  white-space: nowrap;
}

.tile-metric-label {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 0.85vw;
  color: #d4d4d4;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-top: 0.6vw;
}

.tile-actual {
  font-family: 'Anton', sans-serif;
  font-size: 4.2vw;
  line-height: 0.95;
  letter-spacing: 0.01em;
  color: #fafafa;
  text-shadow: 0 2px 12px rgba(0,0,0,0.6);
  margin-top: 0.1vw;
}

/* Hero $$ — glorified, gold, with a subtle glow */
.tile-actual.hero-money {
  font-size: 4.6vw;
  color: var(--flashpoint-yellow);
  text-shadow:
    0 0 22px rgba(244,184,0,0.35),
    0 2px 12px rgba(0,0,0,0.6);
  letter-spacing: 0.005em;
}

.tile.rank-1 .tile-actual.hero-money {
  color: #FFD93D;
  text-shadow:
    0 0 30px rgba(255,217,61,0.55),
    0 0 12px rgba(163,230,53,0.4),
    0 2px 12px rgba(0,0,0,0.7);
}

.tile-actual .prefix {
  font-size: 0.55em;
  vertical-align: top;
  color: var(--text-dim);
  margin-right: 0.05em;
}

/* Stat strip below the big number */
.stat-strip {
  display: flex;
  justify-content: space-between;
  align-items: stretch;
  margin-top: 0.9vw;
  padding: 0.6vw 0;
  border-top: 1px solid var(--border-subtle);
  border-bottom: 1px solid var(--border-subtle);
  gap: 0.6vw;
}

.stat-cell {
  display: flex;
  flex-direction: column;
  gap: 0.15vw;
  flex: 1;
  min-width: 0;
}

.stat-cell .k {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7vw;
  font-weight: 700;
  color: var(--text-dim);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.stat-cell .v {
  font-family: 'Anton', sans-serif;
  font-size: 1.6vw;
  letter-spacing: 0.02em;
  color: var(--text);
  line-height: 1;
}

.row-setters .stat-cell .v {
  font-size: 1.4vw;
}

/* Bottom row inside tile — close rate / conversion */
.tile-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: auto;
  padding-top: 0.5vw;
}

.tile-footer .label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75vw;
  font-weight: 700;
  color: var(--text-faint);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.tile-footer .value {
  font-family: 'Anton', sans-serif;
  font-size: 1.7vw;
  letter-spacing: 0.02em;
  color: var(--flashpoint-yellow);
  line-height: 1;
}

.tile.rank-1 .tile-footer .value {
  color: var(--status-green);
}

/* ============ BOTTOM BAR (identical to thermometer) ============ */
.bottom-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.4vw 0.5vw;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75vw;
  color: var(--text-faint);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.bottom-bar .left,
.bottom-bar .right {
  display: flex;
  gap: 1.5vw;
}

.bottom-bar .stat {
  display: flex;
  gap: 0.4vw;
}

.bottom-bar .stat-val {
  color: var(--text-dim);
}

/* ============ ANIMATIONS ============ */
@keyframes pulse-green {
  0%, 100% { box-shadow: 0 0 50px rgba(163,230,53,0.30), inset 0 0 60px rgba(163,230,53,0.07); }
  50% { box-shadow: 0 0 70px rgba(163,230,53,0.45), inset 0 0 60px rgba(163,230,53,0.10); }
}

.tile.rank-1 {
  animation: pulse-green 4s ease-in-out infinite;
}

@keyframes slide-in {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.tile, .team-summary {
  animation: slide-in 0.5s ease-out backwards;
}

.tile:nth-child(1) { animation-delay: 0.0s; }
.tile:nth-child(2) { animation-delay: 0.08s; }
.tile:nth-child(3) { animation-delay: 0.16s; }
.tile:nth-child(4) { animation-delay: 0.24s; }
.row-setters > *:nth-child(1) { animation-delay: 0.32s; }
.row-setters > *:nth-child(2) { animation-delay: 0.40s; }
.row-setters > *:nth-child(3) { animation-delay: 0.48s; }
.row-setters > *:nth-child(4) { animation-delay: 0.56s; }

/* ============================================================
   MOBILE OVERRIDES — < 768px (phones)
   Same DATA block, same DOM. Sizes mirror the TV's absolute
   pixel proportions so the visual identity stays consistent —
   phone view = one TV tile blown up per row, stacked vertically.
   ============================================================ */
@media (max-width: 767px) {
  html, body { overflow-y: auto; overflow-x: hidden; height: auto; }

  .dashboard {
    height: auto;
    min-height: 100vh;
    padding: 0 0 1.2rem;
    gap: 0;
    grid-template-rows: auto auto auto;
  }

  /* Top strip: stack title above quarter label, centered */
  .top-strip {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto;
    gap: 0.5rem;
    padding: 1.5rem 1.2rem 1.3rem;
    min-height: auto;
    border-radius: 0;
    text-align: center;
  }
  .top-strip > div:first-child { display: none; } /* hide empty spacer */
  .scoreboard-title { font-size: 3.5rem; text-align: center; line-height: 0.95; }
  .quarter-label   { font-size: 2.4rem; text-align: center; }

  /* Grid + rows: flex column with TV-equivalent spacing */
  .grid {
    display: flex;
    flex-direction: column;
    gap: 1.3rem;
    padding: 1.3rem 1.2rem 0;
    min-height: 0;
  }
  .row-reps,
  .row-setters {
    display: flex;
    flex-direction: column;
    gap: 1.3rem;
  }

  /* Hide the APPT SETTERS column-1 label tile on mobile */
  .setter-label { display: none; }

  /* Tile sizing — rem values mirror TV's vw values at 1920px equivalent */
  .tile {
    padding: 1.5rem 1.8rem;
    gap: 0.4rem;
    border-radius: 8px;
    border-width: 2px;
  }
  .tile::before {
    border-top-left-radius: 6px;
    border-top-right-radius: 6px;
    height: 5px;
  }

  .tile-header { gap: 0.7rem; }
  .tile-rep-name      { font-size: 1.5rem; letter-spacing: 0.08em; }
  .tile-rank-badge    { font-size: 2rem;   padding: 0.3rem 0.85rem; }
  .tile-setter-badge  { font-size: 0.9rem; padding: 0.4rem 0.7rem; letter-spacing: 0.1em; }
  .tile-metric-label  { font-size: 1rem;   margin-top: 0.7rem; letter-spacing: 0.2em; }
  .tile-actual        { font-size: 5rem; line-height: 0.95; }
  .tile-actual.hero-money { font-size: 5.2rem; }

  .stat-strip { margin-top: 1rem; padding: 0.7rem 0; gap: 0.7rem; }
  .stat-cell .k { font-size: 0.75rem; letter-spacing: 0.15em; }
  .stat-cell .v { font-size: 1.9rem; }

  .tile-footer       { margin-top: 0.7rem; padding-top: 0.6rem; }
  .tile-footer .label { font-size: 0.9rem; letter-spacing: 0.15em; }
  .tile-footer .value { font-size: 2rem; }

  /* Crown — scaled up to match the bigger tile proportions */
  .crown {
    top: -1.6rem;
    left: auto;
    right: 1rem;
    width: 4.5rem;
    transform: none;
    animation: crown-bob-m 3.5s ease-in-out infinite;
  }
  @keyframes crown-bob-m {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-5px); }
  }

  /* Team summary — TV-equivalent sizing */
  .team-summary {
    padding: 1.5rem 1.8rem;
    border-radius: 8px;
    border-width: 2px;
  }
  .team-summary::before {
    height: 5px;
    border-top-left-radius: 6px;
    border-top-right-radius: 6px;
  }
  .team-summary .ts-label    { font-size: 1.3rem; letter-spacing: 0.18em; }
  .team-summary .ts-rows     { gap: 0.55rem; margin-top: 0.55rem; }
  .team-summary .ts-row      { font-size: 1rem; }
  .team-summary .ts-row .k   { font-size: 0.85rem; letter-spacing: 0.15em; }
  .team-summary .ts-row .v   { font-size: 1.7rem; }

  /* Bottom bar — center, slightly larger text */
  .bottom-bar {
    flex-direction: column;
    gap: 0.5rem;
    padding: 1rem 1.2rem 0.5rem;
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-align: center;
  }
  .bottom-bar .left,
  .bottom-bar .right {
    flex-direction: column;
    gap: 0.4rem;
    width: 100%;
    justify-content: center;
    align-items: center;
  }
  .bottom-bar .stat { justify-content: center; }

  /* ============ VISUAL DRAMA — match TV cinematic feel ============ */

  /* Grain texture bumped slightly so it reads on smaller viewports */
  body::before { opacity: 0.04; }

  /* Strengthen hatch overlay on the red top strip */
  .top-strip::after {
    background: repeating-linear-gradient(
      45deg, transparent, transparent 10px,
      rgba(255,255,255,0.05) 10px, rgba(255,255,255,0.05) 20px
    );
  }

  /* Add subtle inner shadow to top strip for depth */
  .top-strip {
    box-shadow:
      inset 0 -3px 0 rgba(0,0,0,0.35),
      0 4px 14px rgba(0,0,0,0.4);
  }

  /* RANK-1 gradient — fixed-size radial burst (doesn't stretch with tile width) */
  .tile.rank-1 {
    background:
      radial-gradient(circle 320px at 50% 0%, rgba(163,230,53,0.35) 0%, rgba(163,230,53,0.10) 35%, var(--bg-tile) 70%),
      var(--bg-tile);
    box-shadow:
      0 0 60px rgba(163,230,53,0.45),
      0 0 120px rgba(163,230,53,0.20),
      inset 0 -2px 0 rgba(0,0,0,0.4);
  }

  /* RANK-2 gradient — a softer olive burst */
  .tile.rank-2 {
    background:
      radial-gradient(circle 280px at 50% 0%, rgba(101,163,13,0.18) 0%, var(--bg-tile) 65%),
      var(--bg-tile);
    box-shadow:
      0 0 35px rgba(101,163,13,0.18),
      inset 0 -2px 0 rgba(0,0,0,0.4);
  }

  /* Tile depth — subtle bottom shadow for "card" lift */
  .tile {
    box-shadow:
      0 6px 18px rgba(0,0,0,0.45),
      inset 0 -2px 0 rgba(0,0,0,0.35);
  }

  .tile.setter-tile {
    background:
      radial-gradient(circle 280px at 50% 0%, rgba(244,184,0,0.12) 0%, var(--bg-tile) 65%),
      var(--bg-tile);
    box-shadow:
      0 6px 18px rgba(0,0,0,0.45),
      0 0 30px rgba(244,184,0,0.10),
      inset 0 -2px 0 rgba(0,0,0,0.4);
  }

  /* Hero money — stronger glow on mobile so it pops */
  .tile-actual.hero-money {
    text-shadow:
      0 0 24px rgba(244,184,0,0.55),
      0 0 48px rgba(244,184,0,0.25),
      0 2px 0 rgba(0,0,0,0.4);
  }

  /* Pulse-green animation strengthened for mobile aspect ratio */
  @keyframes pulse-green-m {
    0%, 100% { box-shadow:
        0 0 60px rgba(163,230,53,0.45),
        0 0 120px rgba(163,230,53,0.20),
        inset 0 -2px 0 rgba(0,0,0,0.4); }
    50%      { box-shadow:
        0 0 90px rgba(163,230,53,0.60),
        0 0 160px rgba(163,230,53,0.30),
        inset 0 -2px 0 rgba(0,0,0,0.4); }
  }
  .tile.rank-1 { animation: pulse-green-m 4s ease-in-out infinite; }

  /* Team summary — subtle yellow tint */
  .team-summary {
    background:
      radial-gradient(circle 280px at 50% 0%, rgba(244,184,0,0.10) 0%, var(--bg-tile) 65%),
      var(--bg-tile);
    box-shadow:

<script>
// ============================================================
// RENDER LOGIC
// ============================================================

function daysBetween(a, b) {
  const ms = new Date(b) - new Date(a);
  return Math.floor(ms / (1000 * 60 * 60 * 24));
}

function fmtCurrency(n) {
  if (n >= 1000000) return "$" + (n / 1000000).toFixed(2) + "M";
  if (n >= 1000) return "$" + Math.round(n / 1000) + "K";
  return "$" + Math.round(n).toLocaleString();
}

function fmtCurrencyFull(n) {
  return "$" + Math.round(n).toLocaleString();
}

function fmtCount(n) {
  return Math.round(n).toLocaleString();
}

function fmtPct(n) {
  return n.toFixed(1) + "%";
}

function renderQuarterMeta() {
  const { startDate, endDate, refreshDate } = DATA.quarter;
  const totalDays = daysBetween(startDate, endDate) + 1;
  const daysElapsed = daysBetween(startDate, refreshDate) + 1;
  const daysRemaining = totalDays - daysElapsed;
  const pctThrough = (daysElapsed / totalDays) * 100;
  const weekNum = Math.ceil(daysElapsed / 7);
  const totalWeeks = Math.ceil(totalDays / 7);

  // Header shows static "SALES TEAM SCOREBOARD" — no per-refresh meta strip

  document.getElementById("quarter-label").textContent = DATA.quarter.label;

  // Window display = rolling 90 (today - 90 days to today)
  const today = new Date(refreshDate);
  const r90Start = new Date(today);
  r90Start.setDate(r90Start.getDate() - 90);
  document.getElementById("window-display").textContent =
    r90Start.toLocaleDateString("en-US", {month:"short", day:"numeric", timeZone:"UTC"}) +
    " — " +
    today.toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric", timeZone:"UTC"});

  document.getElementById("refresh-display").textContent =
    new Date(refreshDate).toLocaleDateString("en-US", {weekday:"short", month:"short", day:"numeric", timeZone:"UTC"});
}

function renderRepTile(rep, rank) {
  const crown = rank === 1 ? `
    <div class="crown" aria-hidden="true">
      <svg viewBox="0 0 80 56" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="crownGold" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#FFE680"/>
            <stop offset="55%" stop-color="#F4B800"/>
            <stop offset="100%" stop-color="#B27D00"/>
          </linearGradient>
        </defs>
        <path d="M6 50 L10 18 L24 32 L40 8 L56 32 L70 18 L74 50 Z"
              fill="url(#crownGold)" stroke="#7a5400" stroke-width="2" stroke-linejoin="round"/>
        <rect x="6" y="48" width="68" height="6" rx="1" fill="url(#crownGold)" stroke="#7a5400" stroke-width="2"/>
        <circle cx="10" cy="18" r="3.5" fill="#CC0000" stroke="#7a5400" stroke-width="1.2"/>
        <circle cx="40" cy="8" r="4" fill="#CC0000" stroke="#7a5400" stroke-width="1.2"/>
        <circle cx="70" cy="18" r="3.5" fill="#CC0000" stroke="#7a5400" stroke-width="1.2"/>
      </svg>
    </div>
  ` : '';

  return `
    <div class="tile rank-${rank}">
      ${crown}
      <div class="tile-header">
        <div>
          <div class="tile-rep-name">${rep.short}</div>
        </div>
        <div class="tile-rank-badge">#${rank}</div>
      </div>
      <div class="tile-metric-label">Revenue Per Sit</div>
      <div class="tile-actual">${fmtCurrencyFull(rep.revPerSit)}</div>
      <div class="stat-strip">
        <div class="stat-cell">
          <span class="k">Demos</span>
          <span class="v">${fmtCount(rep.demos)}</span>
        </div>
        <div class="stat-cell">
          <span class="k">Sold</span>
          <span class="v">${fmtCount(rep.sold)}</span>
        </div>
        <div class="stat-cell">
          <span class="k">Sold $$</span>
          <span class="v">${fmtCurrency(rep.soldDollars)}</span>
        </div>
      </div>
      <div class="tile-footer">
        <div class="label">Close Rate</div>
        <div class="value">${fmtPct(rep.closeRate)}</div>
      </div>
    </div>
  `;
}
